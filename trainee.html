<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>خطتك التدريبية - تحت إشراف كابتن مصطفى</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --primary: #facc15; --primary-hover: #eab308; --dark-bg: #0b0b0c; --card-bg: #121214; --border-color: #27272a; --text-main: #ffffff; --text-muted: #a1a1aa; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: var(--dark-bg); margin: 0; padding: 20px; color: var(--text-main); }
        .container { max-width: 1200px; margin: 0 auto; }
        
        header { text-align: center; margin-bottom: 30px; background: var(--card-bg); padding: 25px; border-radius: 12px; border: 1px solid var(--border-color); }
        header h1 { font-size: 26px; font-weight: 900; margin: 0 0 15px 0; }
        header h1 span { color: var(--primary); }
        
        .meta-display { display: flex; justify-content: center; gap: 20px; flex-wrap: wrap; margin-bottom: 15px; }
        .meta-badge { background: #000; border: 1px solid var(--border-color); padding: 10px 20px; border-radius: 30px; font-size: 15px; font-weight: bold; display: flex; align-items: center; gap: 8px; }
        .meta-badge span { color: var(--primary); }
        
        .global-notes { background: rgba(250, 204, 21, 0.05); border: 1px dashed var(--primary); padding: 15px; border-radius: 8px; font-size: 14px; color: #fff; max-width: 800px; margin: 15px auto 0 auto; line-height: 1.6; text-align: right; }
        
        .section-title { text-align: center; font-size: 22px; font-weight: bold; margin: 40px 0 20px 0; color: #fff; display: flex; align-items: center; justify-content: center; gap: 10px; }
        
        /* تنسيق الأيام والتمارين المباشر */
        .day-card { background: var(--card-bg); border: 1px solid var(--border-color); border-radius: 12px; padding: 25px; margin-bottom: 30px; border-top: 4px solid var(--primary); }
        .day-title { font-size: 22px; font-weight: bold; margin-bottom: 20px; color: #fff; border-bottom: 1px solid var(--border-color); padding-bottom: 10px; display: flex; align-items: center; gap: 10px; }
        .exercises-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; }
        
        .exercise-column { background: #18181b; border: 1px solid var(--border-color); border-radius: 8px; padding: 15px; box-sizing: border-box; display: flex; flex-direction: column; justify-content: space-between; }
        .ex-header { display: flex; align-items: center; gap: 8px; margin-bottom: 12px; font-weight: bold; color: #fff; font-size: 16px; }
        .ex-meta-info { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; font-size: 13px; color: var(--text-muted); }
        .ex-details b { color: var(--text-muted); }
        .ex-details span { color: #fff; display: block; margin-top: 2px; }
        
        .btn-video { display: flex; align-items: center; justify-content: center; gap: 8px; background: #ef4444; color: #fff; padding: 10px; font-size: 13px; font-weight: bold; border-radius: 6px; text-decoration: none; margin-top: 15px; transition: 0.2s; }
        .btn-video:hover { background: #dc2626; }
        
        .loading-msg { text-align: center; font-size: 16px; color: var(--text-muted); padding: 20px; }
    </style>
</head>
<body>
<div class="container">
    <header>
        <h1><i class="fa-solid fa-dumbbell"></i> خطتك التدريبية | تحت إشراف <span>كابتن مصطفى</span></h1>
        
        <div class="meta-display">
            <div class="meta-badge"><i class="fa-solid fa-weight-scale" style="color:var(--primary)"></i> الوزن الحالي: <span id="lblWeight">--</span> كجم</div>
            <div class="meta-badge"><i class="fa-solid fa-percent" style="color:var(--primary)"></i> نسبة الدهون: <span id="lblFat">--</span> %</div>
        </div>
        
        <div class="global-notes" id="lblNotes">
            <i class="fa-solid fa-thumbtack" style="color:var(--primary)"></i> جاري قراءة بيانات الكابتن...
        </div>
    </header>

    <div class="section-title">
        <i class="fa-solid fa-clipboard-list" style="color:var(--primary)"></i> الخطة التدريبية المخصصة
    </div>

    <div id="scheduleDisplayApp">
        <p class="loading-msg">جاري تحميل الجدول التدريبي المحدث...</p>
    </div>
</div>

<!-- اتصال الفايربيس المستقر -->
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

<script>
const firebaseConfig = {
    apiKey: "AIzaSyCBN-d-L_a5AFc5ZtLMcp3dt2f8wl9ZIxk",
    authDomain: "gym-training-by-mostafa.firebaseapp.com",
    projectId: "gym-training-by-mostafa",
    storageBucket: "gym-training-by-mostafa.firebasestorage.app",
    messagingSenderId: "397520948690",
    appId: "1:397520948690:web:db7c3fe301984ff96f8c0b",
    measurementId: "G-EWZEGSFP99"
};

// تشغيل الفايربيس بأمان وتجنب تعارض الـ Auth
if (!firebase.apps.length) {
    firebase.initializeApp(firebaseConfig);
}
const db = firebase.firestore();

function getClientKey() {
    const urlParams = new URLSearchParams(window.location.search);
    return urlParams.get('id') || "mostafa"; 
}

window.addEventListener('DOMContentLoaded', () => {
    const traineeKey = getClientKey();
    
    // جلب البيانات مع ميزة المزامنة اللحظية الحية لتجنب أي مشاكل كاش
    db.collection("gym_schedules").doc(traineeKey).onSnapshot((doc) => {
        if(doc.exists) {
            const data = doc.data();
            
            document.getElementById('lblWeight').innerText = data.weight || "--";
            document.getElementById('lblFat').innerText = data.fat || "--";
            document.getElementById('lblNotes').innerHTML = data.globalNotes ? 
                `<i class="fa-solid fa-comment-dots" style="color:var(--primary)"></i> <b>ملاحظة الكابتن العامة للمتدرب:</b> ${data.globalNotes}` : 
                `<i class="fa-solid fa-comment-dots" style="color:var(--primary)"></i> لا توجد ملاحظات عامة مكتوبة حالياً.`;
            
            if(data.fullHtml && data.fullHtml.trim() !== "") {
                document.getElementById('scheduleDisplayApp').innerHTML = data.fullHtml;
            } else {
                document.getElementById('scheduleDisplayApp').innerHTML = `<p class="loading-msg">المدرب لم يقم بإضافة تمارين في جدولك حتى الآن.</p>`;
            }
        } else {
            document.getElementById('lblNotes').innerHTML = `<i class="fa-solid fa-triangle-exclamation" style="color:var(--primary)"></i> حساب غير مفعل.`;
            document.getElementById('scheduleDisplayApp').innerHTML = `<p class="loading-msg">لا توجد خطة تدريبية محفوظة باسم ( ${traineeKey} )، يرجى مراجعة كابتن مصطفى.</p>`;
        }
    }, (err) => {
        console.error("خطأ اتصال: ", err);
        document.getElementById('scheduleDisplayApp').innerHTML = `<p class="loading-msg" style="color:#ef4444;">عذراً، فشل الاتصال بقاعدة البيانات. تأكد من اتصال الإنترنت.</p>`;
    });
});
</script>
</body>
</html>
