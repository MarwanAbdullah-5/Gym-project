<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>صفحة المتدرب</title>
    <style>
        body { font-family: Arial, sans-serif; background: #111; color: #fff; padding: 20px; text-align: center; }
        .container { max-width: 500px; margin: auto; background: #222; padding: 20px; border-radius: 10px; border: 1px solid #333; }
        input, button { width: 100%; padding: 10px; margin: 10px 0; border-radius: 5px; border: none; box-sizing: border-box; }
        button { background: #2980b9; color: white; font-weight: bold; cursor: pointer; }
        #workoutSection { display: none; background: #27ae60; padding: 15px; border-radius: 5px; margin-top: 20px; font-size: 18px; }
    </style>
</head>
<body>
    <div class="container">
        <!-- شاشة تسجيل الدخول -->
        <div id="loginSection">
            <h2>تسجيل دخول المتدرب 🔐</h2>
            <input type="email" id="email" placeholder="البريد الإلكتروني">
            <input type="password" id="password" placeholder="كلمة المرور">
            <button onclick="login()">دخول</button>
            <p id="errorStatus" style="color:#c0392b;"></p>
        </div>

        <!-- شاشة عرض الجدول للمتدرب بعد الدخول -->
        <div id="workoutViewSection" style="display:none;">
            <h2>أهلاً بك يا بطل 👋</h2>
            <h3>جدول التمارين الخاص بك اليوم:</h3>
            <div id="workoutContent">جاري تحميل جدولك...</div>
        </div>
    </div>

    <!-- الفايربيس -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script>
        // ضع كود إعدادات الفايربيس الحقيقي الخاص بك هنا (نفس الكود السابق)
         const firebaseConfig = {
      apiKey: "AIzaSyCBN-d-L_a5AFc5ZtLMcp3dt2f8wl9ZIxk",
      authDomain: "gym-training-by-mostafa.firebaseapp.com",
      projectId: "gym-training-by-mostafa",
      storageBucket: "gym-training-by-mostafa.firebasestorage.app",
      messagingSenderId: "397520948690",
      appId: "1:397520948690:web:db7c3fe301984ff96f8c0b",
      measurementId: "G-EWZEGSFP99"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const auth = firebase.auth();

        function login() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const errorStatus = document.getElementById('errorStatus');

            auth.signInWithEmailAndPassword(email, password)
            .then((userCredential) => {
                // استخراج اسم المتدرب من الإيميل (مثال: ahmed@gym.com سيأخذ كلمة ahmed)
                const traineeName = email.split('@')[0];
                
                document.getElementById('loginSection').style.display = 'none';
                document.getElementById('workoutViewSection').style.display = 'block';
                
                // جلب الجدول من قاعدة البيانات بناءً على الاسم
                loadWorkout(traineeName);
            })
            .catch((error) => {
                errorStatus.innerText = "خطأ في تسجيل الدخول: " + error.message;
            });
        }

        function loadWorkout(name) {
            const workoutContent = document.getElementById('workoutContent');
            db.collection("workouts").doc(name).get().then((doc) => {
                if (doc.exists) {
                    workoutContent.innerHTML = `<p style="white-space: pre-line; background:#27ae60; padding:15px; border-radius:5px;">${doc.data().workout}</p>`;
                } else {
                    workoutContent.innerText = "لم يتم إضافة جدول تمارين لك بعد من الكابتن مصطفى.";
                }
            }).catch((error) => {
                workoutContent.innerText = "حدث خطأ أثناء جلب البيانات.";
            });
        }
    </script>
</body>
</html>
