<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>لوحة تحكم الكابتن مصطفى</title>
    <style>
        body { font-family: Arial, sans-serif; background: #1e1e1e; color: #fff; padding: 20px; text-align: center; }
        .container { max-width: 500px; margin: auto; background: #2d2d2d; padding: 20px; border-radius: 10px; }
        input, button, textarea { width: 100%; padding: 10px; margin: 10px 0; border-radius: 5px; border: none; box-sizing: border-box; }
        button { background: #27ae60; color: white; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
    <div class="container">
        <h2>لوحة تحكم الكابتن مصطفى 🏋️‍♂️</h2>
        <input type="text" id="traineeName" placeholder="اسم أو معرف المتدرب (مثال: ahmed)">
        <textarea id="workoutData" rows="5" placeholder="اكتب جدول التمارين هنا..."></textarea>
        <button onclick="saveWorkout()">حفظ وإرسال الجدول سحابياً</button>
        <p id="status"></p>
    </div>

    <!-- الفايربيس -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script>
        // ضع كود إعدادات الفايربيس الحقيقي الخاص بك هنا
         const firebaseConfig = {
  apiKey: "AIzaSyCBN-d-L_a5AFc5ZtLMcp3dt2f8wl9ZIxk",
  authDomain: "gym-training-by-mostafa.firebaseapp.com",
  projectId: "gym-training-by-mostafa",
  storageBucket: "gym-training-by-mostafa.firebasestorage.app",
  messagingSenderId: "397520948690",
  appId: "1:397520948690:web:db7c3fe301984ff96f8c0b",
  measurementId: "G-EWZEGSFP99"
};
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        function saveWorkout() {
            const name = document.getElementById('traineeName').value.trim();
            const workout = document.getElementById('workoutData').value;
            const status = document.getElementById('status');

            if(!name || !workout) { status.innerText = "الرجاء تعبئة جميع الخانات!"; return; }
            status.innerText = "جاري الحفظ...";

            db.collection("workouts").doc(name).set({
                workout: workout,
                updatedAt: new Date()
            }).then(() => {
                status.style.color = "#27ae60";
                status.innerText = "تم حفظ الجدول وإرساله بنجاح! ✅";
            }).catch((error) => {
                status.style.color = "#c0392b";
                status.innerText = "خطأ في الحفظ: " + error.message;
            });
        }
    </script>
</body>
</html>
