<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>لوحة تحكم الكابتن مروان</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --primary: #facc15; --card-bg: #121214; --border-color: #27272a; --text-main: #ffffff; }
        body { font-family: sans-serif; background-color: #0b0b0c; color: var(--text-main); padding: 20px; }
        .container { max-width: 1000px; margin: auto; }
        .control-panel { background: var(--card-bg); border: 1px solid var(--border-color); padding: 20px; border-radius: 12px; margin-bottom: 20px; }
        input { background: #000; border: 1px solid var(--border-color); color: white; padding: 10px; border-radius: 6px; width: 100%; margin-bottom: 10px; }
        button { padding: 10px 20px; border-radius: 6px; border: none; cursor: pointer; font-weight: bold; margin-top: 5px; }
        .btn-main { background: var(--primary); color: #000; }
        .btn-save { background: #22c55e; color: #fff; }
        .btn-import { background: #2563eb; color: #fff; }
    </style>
</head>
<body>
<div class="container">
    <div class="control-panel">
        <h1>لوحة تحكم الكابتن مروان</h1>
        <input type="text" id="clientKeyInput" placeholder="اسم المتدرب (المعرف)">
        <button class="btn-main" onclick="executeSearch()">بحث واستدعاء</button>
        <button class="btn-save" onclick="saveDataToServer()">حفظ التعديلات 💾</button>
        
        <div style="margin-top:20px; border-top:1px solid #333; padding-top:20px;">
            <h4 style="color:var(--primary);">استيراد جدول من متدرب آخر 📋</h4>
            <div style="display:flex; gap:10px;">
                <input type="text" id="importFromId" placeholder="اسم المتدرب القديم...">
                <button class="btn-import" onclick="importSchedule()">استيراد</button>
            </div>
        </div>
    </div>
    <div id="scheduleBuilderApp"></div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
<script>
    const firebaseConfig = {
        apiKey: "AIzaSyCBN-d-L_a5AFc5ZtLMcp3dt2f8wl9ZIxk",
        authDomain: "gym-training-by-mostafa.firebaseapp.com",
        projectId: "gym-training-by-mostafa",
        storageBucket: "gym-training-by-mostafa.firebasestorage.app",
        messagingSenderId: "397520948690",
        appId: "1:397520948690:web:db7c3fe301984ff96f8c0b"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    // دالة البحث وجلب البيانات
    function executeSearch() {
        const key = document.getElementById('clientKeyInput').value.trim().toLowerCase();
        db.collection("gym_schedules").doc(key).get().then(doc => {
            if(doc.exists) {
                const data = doc.data();
                renderScheduleUI(data);
                alert("تم جلب بيانات المتدرب بنجاح");
            } else { alert("المتدرب غير موجود"); }
        });
    }

    // دالة الاستيراد (تستدعي بيانات متدرب قديم وتضعها في الواجهة)
    function importSchedule() {
        const sourceId = document.getElementById('importFromId').value.trim().toLowerCase();
        db.collection("gym_schedules").doc(sourceId).get().then(doc => {
            if(doc.exists) {
                renderScheduleUI(doc.data());
                alert("تم استيراد جدول " + sourceId + " بنجاح! اضغط حفظ لربطه بالمتدرب الحالي.");
            } else { alert("المتدرب المصدر غير موجود"); }
        });
    }

    // دالة الحفظ
    function saveDataToServer() {
        const key = document.getElementById('clientKeyInput').value.trim().toLowerCase();
        if(!key) return alert("يرجى إدخال اسم المتدرب أولاً");
        
        // هنا يتم جمع البيانات من الشاشات (تأكد أن IDs الحقول عندك تطابق هذا المنطق)
        db.collection("gym_schedules").doc(key).set({
            weight: document.getElementById('weightInput')?.value || "",
            fat: document.getElementById('fatInput')?.value || "",
            fullHtml: document.getElementById('fullHtmlInput')?.value || ""
        }).then(() => alert("تم الحفظ بنجاح يا كابتن!"));
    }

    // دالة عرض الواجهة (تأكد أنها متوافقة مع نظامك)
    function renderScheduleUI(data) {
        // إذا كان نظامك يعتمد على حقول إدخال عادية:
        // قم بتعديل هذا الجزء ليعرض البيانات في حقول الإدخال لديك
        console.log("البيانات جاهزة للعرض:", data);
    }
</script>
</body>
</html>
