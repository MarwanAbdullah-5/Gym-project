<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة تحكم المدرب الذكية - كابتن مصطفى</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --primary: #facc15; --primary-hover: #eab308; --dark-bg: #0b0b0c; --card-bg: #121214; --border-color: #27272a; --text-main: #ffffff; --text-muted: #a1a1aa; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: var(--dark-bg); margin: 0; padding: 20px; color: var(--text-main); }
        .container { max-width: 1300px; margin: 0 auto; }
        header { text-align: center; margin-bottom: 30px; background: var(--card-bg); padding: 20px; border-radius: 12px; border: 1px solid var(--border-color); }
        header h1 { font-size: 28px; font-weight: 900; margin: 0 0 10px 0; }
        header h1 span { color: var(--primary); }
        
        /* شريط إدارة المتدربين والبحث */
        .manager-bar { background: var(--card-bg); border: 1px solid var(--border-color); border-radius: 12px; padding: 20px; margin-bottom: 25px; display: flex; flex-wrap: wrap; gap: 15px; align-items: center; justify-content: space-between; }
        .search-zone { display: flex; align-items: center; gap: 10px; flex-grow: 1; max-width: 600px; }
        .search-zone select, .search-zone input { background: #000; border: 1px solid var(--border-color); color: #fff; padding: 10px 15px; border-radius: 6px; font-size: 15px; font-family: inherit; }
        .search-zone select { flex-grow: 1; cursor: pointer; }
        .search-zone input { width: 140px; }
        .search-zone select:focus, .search-zone input:focus { border-color: var(--primary); outline: none; }
        
        .meta-inputs { display: flex; gap: 15px; flex-wrap: wrap; background: rgba(0,0,0,0.2); padding: 15px; border-radius: 8px; border: 1px dashed var(--border-color); width: 100%; margin-top: 15px; }
        .meta-group { display: flex; align-items: center; gap: 8px; }
        .meta-group label { font-size: 14px; color: var(--text-muted); font-weight: bold; }
        .meta-group input { background: #000; border: 1px solid var(--border-color); color: #fff; padding: 8px; border-radius: 6px; width: 90px; text-align: center; }
        .meta-group.notes-group { flex-grow: 1; }
        .meta-group.notes-group input { width: 100%; text-align: right; }

        .btn { background: var(--primary); color: #000; border: none; padding: 10px 20px; font-size: 14px; font-weight: bold; border-radius: 6px; cursor: pointer; transition: 0.2s; display: inline-flex; align-items: center; gap: 8px; }
        .btn:hover { background: var(--primary-hover); }
        .btn-secondary { background: #27272a; color: #fff; border: 1px solid #3f3f46; }
        .btn-secondary:hover { background: #3f3f46; }
        .btn-danger { background: #ef4444; color: #fff; }
        .btn-danger:hover { background: #dc2626; }
        
        #saveStatus { font-weight: bold; font-size: 14px; color: #4ade80; display: inline-flex; align-items: center; gap: 5px; }
        
        /* هيكل الأيام والتمارين */
        .day-card { background: var(--card-bg); border-radius: 12px; padding: 25px; margin-bottom: 30px; border: 1px solid var(--border-color); border-top: 4px solid var(--primary); }
        .day-title { font-size: 22px; font-weight: bold; margin-bottom: 20px; display: flex; align-items: center; gap: 10px; border-bottom: 1px solid var(--border-color); padding-bottom: 10px; }
        .exercises-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; }
        .exercise-column { background: #18181b; border: 1px solid var(--border-color); border-radius: 8px; padding: 15px; position: relative; }
        .ex-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
        .ex-name-input { background: transparent; border: none; border-bottom: 1px solid #3f3f46; color: #fff; font-size: 16px; font-weight: bold; padding: 5px 0; width: 85%; }
        .ex-name-input:focus { border-color: var(--primary); outline: none; }
        .btn-delete-exercise { background: transparent; border: none; color: #ef4444; cursor: pointer; font-size: 16px; }
        .ex-details-form { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px; }
        .field-box { display: flex; flex-direction: column; gap: 4px; }
        .field-box label { font-size: 12px; color: var(--text-muted); }
        .field-box input { background: #000; border: 1px solid #3f3f46; color: #fff; padding: 6px; border-radius: 4px; font-size: 13px; }
        .field-box input:focus { border-color: var(--primary); outline: none; }
        .video-url-input { background: #000; border: 1px solid #3f3f46; color: #fff; padding: 8px; border-radius: 4px; font-size: 12px; width: 100%; box-sizing: border-box; margin-top: 5px; }
    </style>
</head>
<body>
<div class="container">
    <header>
        <h1>🚀 لوحة المدرب المتقدمة | تحت إشراف <span>كابتن مصطفى</span></h1>
        <p style="color: var(--text-muted); margin: 5px 0 0 0;">إدارة الجداول، تعديل البيانات، والمزامنة السحابية اللحظية التلقائية</p>
    </header>

    <!-- شريط البحث والتحكم في المتدربين -->
    <div class="manager-bar">
        <div class="search-zone">
            <i class="fa-solid fa-user-check" style="color: var(--primary); font-size: 18px;"></i>
            <select id="traineeSelector" onchange="selectTrainee(this.value)">
                <option value="">-- اختر متدرباً للتعديل أو البحث --</option>
            </select>
            <span style="color: var(--text-muted);">أو اكتب معرف جديد:</span>
            <input type="text" id="clientKeyInput" value="ahmed" placeholder="مثال: ahmed" oninput="syncManualKey(this.value)">
        </div>
        
        <div>
            <button class="btn btn-secondary" onclick="generateDefaultStructure()">إنشاء وحفظ الجدول ⚡</button>
            <span id="saveStatus" style="margin-right: 15px; display: none;"><i class="fa-solid fa-cloud-arrow-up"></i> تم الحفظ تلقائياً!</span>
        </div>

        <!-- خانات الأوزان والملاحظات العامة للمتدرب المختار -->
        <div class="meta-inputs">
            <div class="meta-group">
                <label><i class="fa-solid fa-weight-scale"></i> الوزن (كجم):</label>
                <input type="text" id="clientWeightInput" placeholder="--">
            </div>
            <div class="meta-group">
                <label><i class="fa-solid fa-percent"></i> الدهون (%):</label>
                <input type="text" id="clientFatInput" placeholder="--">
            </div>
            <div class="meta-group notes-group">
                <label><i class="fa-solid fa-comment-dots"></i> ملاحظات كابتن مصطفى العامة لهذا اللاعب:</label>
                <input type="text" id="globalNotesInput" placeholder="اكتب توجيهات عامة للاعب تظهر في أعلى صفحته...">
            </div>
        </div>
    </div>

    <!-- حاوية بناء الجدول التدريبي -->
    <div id="scheduleBuilderApp"></div>
</div>

<!-- مكتبات الفايربيس السحابية -->
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

<script>
const firebaseConfig = {
    apiKey: "AIzaSyCBN-d-L_a5AFc5ZtLMcp3dt2f8wl9ZIxk",
    authDomain: "gym-training-by-mostafa.firebaseapp.com",
    projectId: "gym-training-by-mostafa",
    storageBucket: "gym-training-by-mostafa.firebasestorage.app",
    messagingSenderId: "397520948690",
    appId: "1:397520948690:web:db7c3fe301984ff96f8c0b",
    measurementId: "G-EWZEGSFP99"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

const daysOfWeek = ["السبت", "الأحد", "الإثنين", "الثلاثاء", "الأربعاء", "الخميس", "الجمعة"];
let autoSaveTimeout;

// 1. تحميل قائمة المتدربين المسجلين فور فتح الصفحة
window.addEventListener('DOMContentLoaded', () => {
    loadTraineesList();
    setupGlobalAutoSave();
    // جلب بيانات الحساب الافتراضي المكتوب في الخانة أولاً
    loadTraineeDataFromServer(document.getElementById('clientKeyInput').value.trim());
});

// دالة لجلب كل المتدربين الذين لديهم جداول محفوظة في السيرفر لتسهيل البحث واختيارهم
function loadTraineesList() {
    db.collection("gym_schedules").get().then((querySnapshot) => {
        const selector = document.getElementById('traineeSelector');
        // تفريغ القائمة باستثناء الخيار الأول
        selector.innerHTML = '<option value="">-- اختر متدرباً للتعديل أو البحث --</option>';
        
        querySnapshot.forEach((doc) => {
            const option = document.createElement('option');
            option.value = doc.id;
            option.innerText = `المتدرب: ${doc.id}`;
            selector.appendChild(option);
        });
    }).catch(err => console.error("خطأ في جلب القائمة: ", err));
}

// دالة عند اختيار اسم من القائمة المنسدلة
function selectTrainee(selectedKey) {
    if(!selectedKey) return;
    document.getElementById('clientKeyInput').value = selectedKey;
    loadTraineeDataFromServer(selectedKey);
}

// دالة لمزامنة الخانة اليدوية مع النظام
function syncManualKey(val) {
    triggerAutoSave();
}

// 2. توليد الهيكل المبدئي للأيام السبعة
function generateDefaultStructure() {
    const app = document.getElementById('scheduleBuilderApp');
    app.innerHTML = "";
    
    daysOfWeek.forEach((day, dayIndex) => {
        const dayCard = document.createElement('div');
        dayCard.className = 'day-card';
        dayCard.dataset.dayName = day;
        dayCard.innerHTML = `
            <div class="day-title"><i class="fa-solid fa-calendar-day" style="color:var(--primary);"></i> يوم ${day}</div>
            <div class="exercises-grid" id="grid-day-${dayIndex}"></div>
            <button class="btn btn-secondary" style="margin-top:15px; padding:6px 12px; font-size:12px;" onclick="addExerciseField(${dayIndex}, '', '', '', '', '', '')">
                <i class="fa-solid fa-plus"></i> إضافة تمرين لهذا اليوم
            </button>
        `;
        app.appendChild(dayCard);
        
        // إضافة 3 تمارين فارغة كبداية
        for(let i=0; i<3; i++) {
            addExerciseField(dayIndex, '', '', '', '', '', '');
        }
    });
    triggerAutoSave();
}

// 3. إضافة حقول تمرين داخل يوم معين
function addExerciseField(dayIndex, name='', sets='', reps='', rest='', rpe='', video='') {
    const grid = document.getElementById(`grid-day-${dayIndex}`);
    const box = document.createElement('div');
    box.className = 'exercise-column';
    box.innerHTML = `
        <div class="ex-header">
            <input type="text" class="ex-name-input" value="${name}" placeholder="اسم التمرين...">
            <button class="btn-delete-exercise" onclick="this.parentElement.parentElement.remove(); triggerAutoSave();">
                <i class="fa-solid fa-trash-can"></i>
            </button>
        </div>
        <div class="ex-details-form">
            <div class="field-box"><label>الجولات</label><input type="text" class="ex-sets" value="${sets}" placeholder="مثال: 4"></div>
            <div class="field-box"><label>التكرارات</label><input type="text" class="ex-reps" value="${reps}" placeholder="مثال: 12"></div>
            <div class="field-box"><label>الراحة</label><input type="text" class="ex-rest" value="${rest}" placeholder="90 ثانية"></div>
            <div class="field-box"><label>RPE (الجهد)</label><input type="text" class="ex-rpe" value="${rpe}" placeholder="8/10"></div>
        </div>
        <div class="field-box">
            <label><i class="fa-brands fa-youtube" style="color:#ef4444;"></i> رابط فيديو الشرح المساعد:</label>
            <input type="url" class="video-url-input" value="${video}" placeholder="https://youtube.com/...">
            <a class="btn-video" href="${video || '#'}" target="_blank" style="display:${video ? 'flex' : 'none'}; margin-top:5px; background:#27272a; color:#fff; border:1px solid #3f3f46;">
                <i class="fa-solid fa-play"></i> تجربة الرابط الحالي
            </a>
        </div>
    `;
    
    // مراقبة المدخلات داخل مربع التمرين لتشغيل الحفظ التلقائي
    box.querySelectorAll('input').forEach(input => {
        input.addEventListener('input', () => {
            if(input.classList.contains('video-url-input')) {
                const btn = input.nextElementSibling;
                btn.href = input.value;
                btn.style.display = input.value ? 'flex' : 'none';
            }
            triggerAutoSave();
        });
    });
    
    grid.appendChild(box);
}

// 4. إعداد الحفظ التلقائي الذكي عند الكتابة
function setupGlobalAutoSave() {
    ['clientWeightInput', 'clientFatInput', 'globalNotesInput'].forEach(id => {
        document.getElementById(id).addEventListener('input', triggerAutoSave);
    });
}

function triggerAutoSave() {
    clearTimeout(autoSaveTimeout);
    autoSaveTimeout = setTimeout(saveDataToServer, 1500); // حفظ تلقائي بعد ثانية ونصف من التوقف عن الكتابة
}

// 5. تجميع البيانات وحفظها السحابي في الفايربيس
function saveDataToServer() {
    const clientKey = document.getElementById('clientKeyInput').value.trim();
    if (!clientKey) return;
    
    const weight = document.getElementById('clientWeightInput').value;
    const fat = document.getElementById('clientFatInput').value;
    const globalNotes = document.getElementById('globalNotesInput').value;
    
    const dayCards = document.querySelectorAll('.day-card');
    if(dayCards.length === 0) return;
    
    let htmlOutput = "";
    let videoLinksArray = [];
    let stateArray = []; // لحفظ قيم المدخلات من أجل إعادة تحميلها للكابتن لاحقاً
    
    dayCards.forEach((card, dayIndex) => {
        const dayName = card.dataset.dayName;
        const exercises = card.querySelectorAll('.exercise-column');
        
        let dayExercisesHtml = "";
        let dayState = [];
        
        exercises.forEach(ex => {
            const name = ex.querySelector('.ex-name-input').value.trim();
            const sets = ex.querySelector('.ex-sets').value.trim();
            const reps = ex.querySelector('.ex-reps').value.trim();
            const rest = ex.querySelector('.ex-rest').value.trim();
            const rpe = ex.querySelector('.ex-rpe').value.trim();
            const video = ex.querySelector('.video-url-input').value.trim();
            
            dayState.push({ name, sets, reps, rest, rpe, video });
            
            if(name) {
                videoLinksArray.push(video);
                dayExercisesHtml += `
                    <div class="exercise-column">
                        <div class="ex-header"><i class="fa-solid fa-circle-check"></i><div class="ex-name">${name}</div></div>
                        <div class="ex-meta-info">
                            <div class="ex-details"><b>الجولات:</b><span>${sets || '--'}</span></div>
                            <div class="ex-details"><b>التكرارات:</b><span>${reps || '--'}</span></div>
                            <div class="ex-details"><b>الراحة:</b><span>${rest || '--'}</span></div>
                            <div class="ex-details"><b>مستوى الجهد RPE:</b><span>${rpe || '--'}</span></div>
                        </div>
                        <input type="text" class="video-url-input" value="${video}" style="display:none;">
                        <a class="btn-video" href="${video}" target="_blank" style="display:none;"><i class="fa-solid fa-video"></i> مشاهدة فيديو التكنيك 📺</a>
                    </div>
                `;
            }
        });
        
        stateArray.push({ dayName, exercises: dayState });
        
        htmlOutput += `
            <div class="day-card">
                <div class="day-title"><i class="fa-solid fa-dumbbell"></i> تمارین يوم ${dayName}</div>
                <div class="exercises-grid">${dayExercisesHtml || '<p style="color:var(--text-muted); font-size:14px;">يوم راحة واستشفاء عضلاتي تام 💤</p>'}</div>
            </div>
        `;
    });
    
    const packet = {
        weight: weight,
        fat: fat,
        globalNotes: globalNotes,
        fullHtml: htmlOutput,
        videoLinks: JSON.stringify(videoLinksArray),
        editorState: JSON.stringify(stateArray),
        lastUpdated: firebase.firestore.FieldValue.serverTimestamp()
    };
    
    db.collection("gym_schedules").doc(clientKey).set(packet)
    .then(() => {
        const status = document.getElementById('saveStatus');
        status.style.display = "inline-flex";
        setTimeout(() => { status.style.display = "none"; }, 2000);
        // تحديث القائمة المنسدلة لضمان ظهور أي اسم جديد مباشرة
        loadTraineesList();
    })
    .catch(err => console.error("خطأ الحفظ السحابي: ", err));
}

// 6. تحميل بيانات متدرب معين وإعادة بنائها في لوحة الكابتن عند البحث أو الاختيار
function loadTraineeDataFromServer(clientKey) {
    if(!clientKey) return;
    
    db.collection("gym_schedules").doc(clientKey).get().then((doc) => {
        if(doc.exists) {
            const data = doc.data();
            document.getElementById('clientWeightInput').value = data.weight || "";
            document.getElementById('clientFatInput').value = data.fat || "";
            document.getElementById('globalNotesInput').value = data.globalNotes || "";
            
            if(data.editorState) {
                const parsedState = JSON.parse(data.editorState);
                const app = document.getElementById('scheduleBuilderApp');
                app.innerHTML = "";
                
                parsedState.forEach((dayObj, dayIndex) => {
                    const dayCard = document.createElement('div');
                    dayCard.className = 'day-card';
                    dayCard.dataset.dayName = dayObj.dayName;
                    dayCard.innerHTML = `
                        <div class="day-title"><i class="fa-solid fa-calendar-day" style="color:var(--primary);"></i> يوم ${dayObj.dayName}</div>
                        <div class="exercises-grid" id="grid-day-${dayIndex}"></div>
                        <button class="btn btn-secondary" style="margin-top:15px; padding:6px 12px; font-size:12px;" onclick="addExerciseField(${dayIndex}, '', '', '', '', '', '')">
                            <i class="fa-solid fa-plus"></i> إضافة تمين لهذا اليوم
                        </button>
                    `;
                    app.appendChild(dayCard);
                    
                    dayObj.exercises.forEach(ex => {
                        addExerciseField(dayIndex, ex.name, ex.sets, ex.reps, ex.rest, ex.rpe, ex.video);
                    });
                });
            }
        } else {
            // إذا كان المستخدم جديداً وليس لديه بيانات مخزنة
            document.getElementById('clientWeightInput').value = "";
            document.getElementById('clientFatInput').value = "";
            document.getElementById('globalNotesInput').value = "";
            document.getElementById('scheduleBuilderApp').innerHTML = `<p style="text-align:center; color:var(--text-muted); padding:20px;">لا يوجد جدول محفوظ لهذا المعرف بعد. اضغط على زر "إنشاء وحفظ الجدول ⚡" للبدء في صياغة جدوله.</p>`;
        }
    }).catch(err => console.error("خطأ أثناء جلب بيانات المتدرب: ", err));
}
</script>
</body>
</html>
