<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة تحكم المدرب الذكية - كابتن مصطفى</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --primary: #facc15; --primary-hover: #eab308; --dark-bg: #0b0b0c; --card-bg: #121214; --border-color: #27272a; --text-main: #ffffff; --text-muted: #a1a1aa; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: var(--dark-bg); margin: 0; padding: 20px; color: var(--text-main); }
        .container { max-width: 1300px; margin: 0 auto; }
        header { text-align: center; margin-bottom: 30px; background: var(--card-bg); padding: 20px; border-radius: 12px; border: 1px solid var(--border-color); }
        header h1 { font-size: 28px; font-weight: 900; margin: 0 0 10px 0; }
        header h1 span { color: var(--primary); }
        
        .manager-bar { background: var(--card-bg); border: 1px solid var(--border-color); border-radius: 12px; padding: 20px; margin-bottom: 25px; display: flex; flex-wrap: wrap; gap: 15px; align-items: center; justify-content: space-between; }
        .search-zone { display: flex; align-items: center; gap: 10px; flex-grow: 1; flex-wrap: wrap; }
        .search-zone select, .search-zone input { background: #000; border: 1px solid var(--border-color); color: #fff; padding: 10px 15px; border-radius: 6px; font-size: 15px; font-family: inherit; }
        .search-zone select { min-width: 200px; cursor: pointer; }
        .search-zone input { width: 140px; }
        .search-zone select:focus, .search-zone input:focus { border-color: var(--primary); outline: none; }
        
        .meta-inputs { display: flex; gap: 15px; flex-wrap: wrap; background: rgba(0,0,0,0.2); padding: 15px; border-radius: 8px; border: 1px dashed var(--border-color); width: 100%; margin-top: 15px; }
        .meta-group { display: flex; align-items: center; gap: 8px; }
        .meta-group label { font-size: 14px; color: var(--text-muted); font-weight: bold; }
        .meta-group input { background: #000; border: 1px solid var(--border-color); color: #fff; padding: 8px; border-radius: 6px; width: 90px; text-align: center; }
        .meta-group.notes-group { flex-grow: 1; }
        .meta-group.notes-group input { width: 100%; text-align: right; }

        .btn { background: var(--primary); color: #000; border: none; padding: 10px 20px; font-size: 14px; font-weight: bold; border-radius: 6px; cursor: pointer; transition: 0.2s; display: inline-flex; align-items: center; gap: 8px; }
        .btn:hover { background: var(--primary-hover); }
        .btn-secondary { background: #27272a; color: #fff; border: 1px solid #3f3f46; }
        .btn-secondary:hover { background: #3f3f46; }
        .btn-save { background: #22c55e; color: #fff; font-size: 16px; padding: 12px 25px; }
        .btn-save:hover { background: #16a34a; }
        
        #saveStatus { font-weight: bold; font-size: 14px; color: #4ade80; display: inline-flex; align-items: center; gap: 5px; }
        
        .day-card { background: var(--card-bg); border-radius: 12px; padding: 25px; margin-bottom: 30px; border: 1px solid var(--border-color); border-top: 4px solid var(--primary); }
        .day-title-input { background: transparent; border: none; border-bottom: 2px dashed #3f3f46; color: #fff; font-size: 22px; font-weight: bold; margin-bottom: 20px; padding: 5px; width: 300px; font-family: inherit; }
        .day-title-input:focus { border-color: var(--primary); outline: none; }
        
        .exercises-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 20px; }
        .exercise-column { background: #18181b; border: 1px solid var(--border-color); border-radius: 8px; padding: 15px; position: relative; }
        .ex-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
        .ex-name-input { background: transparent; border: none; border-bottom: 1px solid #3f3f46; color: #fff; font-size: 16px; font-weight: bold; padding: 5px 0; width: 85%; }
        .ex-name-input:focus { border-color: var(--primary); outline: none; }
        .btn-delete-exercise { background: transparent; border: none; color: #ef4444; cursor: pointer; font-size: 16px; }
        
        .ex-details-form { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px; }
        .field-box { display: flex; flex-direction: column; gap: 4px; position: relative; }
        .field-box-header { display: flex; justify-content: space-between; align-items: center; }
        .field-box label { font-size: 12px; color: var(--text-muted); }
        .field-box input { background: #000; border: 1px solid #3f3f46; color: #fff; padding: 6px; border-radius: 4px; font-size: 13px; }
        .field-box input:focus { border-color: var(--primary); outline: none; }
        
        .toggle-visibility { background: transparent; border: none; color: #a1a1aa; cursor: pointer; font-size: 12px; padding: 2px; }
        .toggle-visibility.hidden-mode { color: #ef4444; }
        
        .video-url-input { background: #000; border: 1px solid #3f3f46; color: #fff; padding: 8px; border-radius: 4px; font-size: 12px; width: 100%; box-sizing: border-box; }
    </style>
</head>
<body>
<div class="container">
    <header>
        <h1>🚀 لوحة المدرب المتقدمة | تحت إشراف <span>كابتن مصطفى</span></h1>
    </header>

    <div class="manager-bar">
        <div class="search-zone">
            <i class="fa-solid fa-user-check" style="color: var(--primary); font-size: 18px;"></i>
            <select id="traineeSelector" onchange="selectTrainee(this.value)">
                <option value="">-- اختر متدرباً --</option>
            </select>
            <input type="text" id="clientKeyInput" placeholder="اسم المتدرب">
            <button class="btn" onclick="executeSearch()"><i class="fa-solid fa-magnifying-glass"></i> استدعاء</button>
            <!-- إضافة زر الاستيراد هنا -->
            <button class="btn btn-secondary" onclick="importTraineeData()"><i class="fa-solid fa-file-import"></i> استيراد من متدرب آخر</button>
        </div>
        
        <div style="display: flex; gap: 10px; align-items: center;">
            <button class="btn btn-secondary" onclick="generateDefaultStructure()">+ هيكل جديد</button>
            <button class="btn btn-save" onclick="saveDataToServer()"><i class="fa-solid fa-floppy-disk"></i> حفظ</button>
            <span id="saveStatus" style="display: none;"><i class="fa-solid fa-circle-check"></i> تم الحفظ!</span>
        </div>
        
        <div class="meta-inputs">
            <div class="meta-group"><label>الوزن:</label><input type="text" id="clientWeightInput"></div>
            <div class="meta-group"><label>الدهون:</label><input type="text" id="clientFatInput"></div>
            <div class="meta-group notes-group"><label>ملاحظات:</label><input type="text" id="globalNotesInput"></div>
        </div>
    </div>

    <div id="scheduleBuilderApp"></div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
<script>
// ... (نفس إعدادات Firebase والوظائف السابقة الخاصة بك) ...
const firebaseConfig = {
    apiKey: "AIzaSyCBN-d-L_a5AFc5ZtLMcp3dt2f8wl9ZIxk",
    authDomain: "gym-training-by-mostafa.firebaseapp.com",
    projectId: "gym-training-by-mostafa",
    storageBucket: "gym-training-by-mostafa.firebasestorage.app",
    messagingSenderId: "397520948690",
    appId: "1:397520948690:web:db7c3fe301984ff96f8c0b",
    measurementId: "G-EWZEGSFP99"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

// دالة الاستيراد الجديدة
function importTraineeData() {
    const sourceKey = prompt("اكتب اسم المتدرب (المصدر) الذي تريد سحب جدول التمارين منه:");
    if(!sourceKey) return;
    
    db.collection("gym_schedules").doc(sourceKey).get().then((doc) => {
        if(doc.exists) {
            const data = doc.data();
            // تعبئة البيانات في الشاشة الحالية
            document.getElementById('clientWeightInput').value = data.weight || "";
            document.getElementById('clientFatInput').value = data.fat || "";
            document.getElementById('globalNotesInput').value = data.globalNotes || "";
            
            if(data.editorState) {
                const parsedState = JSON.parse(data.editorState);
                const app = document.getElementById('scheduleBuilderApp');
                app.innerHTML = "";
                parsedState.forEach((dayObj, dayIndex) => {
                    createDayCardElement(dayIndex, dayObj.dayName, dayObj.exercises);
                });
                alert("تم استيراد بيانات " + sourceKey + " بنجاح!");
            }
        } else {
            alert("المتدرب المصدر غير موجود في قاعدة البيانات.");
        }
    });
}

// ... (أبقِ بقية الدوال الأصلية كما هي: executeSearch, saveDataToServer, loadTraineesList, createDayCardElement, addExerciseField, toggleFieldVisibility, generateDefaultStructure) ...
// (ملاحظة: تأكد من لصق الدوال الأصلية في نهاية السكريبت كما كانت)
</script>
</body>
</html>
