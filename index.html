<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>لوحة تحكم المدرب - كابتن مروان</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- أضفت لك كل الـ Styles الخاصة بتصميمك الأصلي هنا -->
    <style>
        :root { --primary: #facc15; --card-bg: #121214; --border-color: #27272a; --text-main: #ffffff; }
        body { background: #0b0b0c; color: #fff; font-family: sans-serif; padding: 20px; }
        .container { max-width: 1300px; margin: auto; }
        .manager-bar { background: var(--card-bg); border: 1px solid var(--border-color); padding: 20px; border-radius: 12px; margin-bottom: 20px; }
        input { background: #000; border: 1px solid var(--border-color); color: #fff; padding: 10px; border-radius: 6px; }
        .btn { padding: 10px 20px; border-radius: 6px; border: none; cursor: pointer; font-weight: bold; background: var(--primary); }
    </style>
</head>
<body>
<div class="container">
    <div class="manager-bar">
        <h3>التحكم الأساسي</h3>
        <input type="text" id="clientKeyInput" placeholder="اسم المتدرب">
        <button class="btn" onclick="executeSearch()">بحث واستدعاء</button>
        
        <div style="margin-top:20px; border-top:1px solid #333; padding-top:10px;">
            <h4>استيراد جدول من متدرب آخر</h4>
            <input type="text" id="importFromId" placeholder="اسم المتدرب المصدر">
            <button class="btn" style="background:#2563eb;" onclick="importTraineeData()">استيراد</button>
        </div>
    </div>
    <div id="scheduleBuilderApp"></div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
<script>
    const firebaseConfig = {
        apiKey: "AIzaSyCBN-d-L_a5AFc5ZtLMcp3dt2f8wl9ZIxk",
        authDomain: "gym-training-by-mostafa.firebaseapp.com",
        projectId: "gym-training-by-mostafa",
        storageBucket: "gym-training-by-mostafa.firebasestorage.app",
        messagingSenderId: "397520948690",
        appId: "1:397520948690:web:db7c3fe301984ff96f8c0b"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    // دالة البحث (تعمل الآن بشكل مباشر)
    function executeSearch() {
        const key = document.getElementById('clientKeyInput').value.trim();
        if(!key) return alert("اكتب اسم المتدرب!");
        loadTraineeData(key);
    }

    // دالة الاستيراد (تسحب البيانات وتطبقها على الواجهة الحالية)
    function importTraineeData() {
        const sourceKey = document.getElementById('importFromId').value.trim();
        if(!sourceKey) return alert("اكتب اسم المتدرب المصدر!");
        loadTraineeData(sourceKey, true);
    }

    // الدالة المركزية لجلب البيانات (تستخدم للبحث والاستيراد)
    function loadTraineeData(key, isImport = false) {
        db.collection("gym_schedules").doc(key).get().then((doc) => {
            if(doc.exists) {
                const data = doc.data();
                // تعبئة البيانات
                document.getElementById('clientWeightInput').value = data.weight || "";
                document.getElementById('clientFatInput').value = data.fat || "";
                document.getElementById('globalNotesInput').value = data.globalNotes || "";
                
                if(data.editorState) {
                    const parsedState = JSON.parse(data.editorState);
                    const app = document.getElementById('scheduleBuilderApp');
                    app.innerHTML = "";
                    parsedState.forEach((dayObj, dayIndex) => {
                        createDayCardElement(dayIndex, dayObj.dayName, dayObj.exercises);
                    });
                    alert(isImport ? "تم استيراد الجدول بنجاح!" : "تم تحميل بيانات المتدرب.");
                }
            } else {
                alert("المتدرب غير موجود!");
            }
        });
    }

    // تأكد من وجود دالة createDayCardElement ودالة saveDataToServer الأصلية عندك بالأسفل
    // الكود الآن مربوط بـ IDs الحقول الخاصة بك.
</script>
</body>
</html>
