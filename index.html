<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>لوحة تحكم الكابتن مروان</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --primary: #facc15; --dark-bg: #0b0b0c; --card-bg: #121214; --border-color: #27272a; --text-main: #ffffff; }
        body { font-family: sans-serif; background-color: var(--dark-bg); color: var(--text-main); padding: 20px; }
        .container { max-width: 1000px; margin: auto; }
        .box { background: var(--card-bg); border: 1px solid var(--border-color); padding: 20px; border-radius: 12px; margin-bottom: 20px; }
        input, textarea { width: 100%; padding: 10px; margin: 5px 0; background: #000; border: 1px solid var(--border-color); color: white; border-radius: 6px; box-sizing: border-box; }
        button { cursor: pointer; padding: 10px 20px; border: none; border-radius: 6px; font-weight: bold; }
        .btn-save { background: #22c55e; color: white; }
        .btn-import { background: #2563eb; color: white; }
    </style>
</head>
<body>
<div class="container">
    <div class="box">
        <h1>لوحة تحكم الكابتن مروان</h1>
        <input type="text" id="clientKeyInput" placeholder="اسم المتدرب (المعرف)">
        <button onclick="executeSearch()" style="background:var(--primary);">بحث واستدعاء</button>
        <button class="btn-save" onclick="saveDataToServer()">حفظ وتحديث الجدول 💾</button>
    </div>

    <div class="box">
        <h3>استيراد جدول من متدرب آخر 📋</h3>
        <input type="text" id="importFromId" placeholder="اكتب اسم المتدرب القديم للنسخ منه...">
        <button class="btn-import" onclick="importSchedule()">استيراد الجدول</button>
    </div>

    <div class="box">
        <label>الوزن:</label><input type="text" id="weightInput">
        <label>نسبة الدهون:</label><input type="text" id="fatInput">
        <label>ملاحظات عامة:</label><textarea id="notesInput"></textarea>
        <label>كود الجدول (HTML):</label><textarea id="fullHtmlInput" rows="10"></textarea>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
<script>
    const firebaseConfig = {
        apiKey: "AIzaSyCBN-d-L_a5AFc5ZtLMcp3dt2f8wl9ZIxk",
        authDomain: "gym-training-by-mostafa.firebaseapp.com",
        projectId: "gym-training-by-mostafa",
        storageBucket: "gym-training-by-mostafa.firebasestorage.app",
        messagingSenderId: "397520948690",
        appId: "1:397520948690:web:db7c3fe301984ff96f8c0b"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    function executeSearch() {
        const key = document.getElementById('clientKeyInput').value.trim().toLowerCase();
        db.collection("gym_schedules").doc(key).get().then(doc => {
            if(doc.exists) {
                const d = doc.data();
                document.getElementById('weightInput').value = d.weight || "";
                document.getElementById('fatInput').value = d.fat || "";
                document.getElementById('notesInput').value = d.globalNotes || "";
                document.getElementById('fullHtmlInput').value = d.fullHtml || "";
                alert("تم تحميل بيانات المتدرب");
            } else { alert("المتدرب غير موجود، يمكنك البدء بكتابة بياناته الآن."); }
        });
    }

    function saveDataToServer() {
        const key = document.getElementById('clientKeyInput').value.trim().toLowerCase();
        if(!key) return alert("اكتب اسم المتدرب أولاً!");
        db.collection("gym_schedules").doc(key).set({
            weight: document.getElementById('weightInput').value,
            fat: document.getElementById('fatInput').value,
            globalNotes: document.getElementById('notesInput').value,
            fullHtml: document.getElementById('fullHtmlInput').value
        }).then(() => alert("تم حفظ الجدول بنجاح يا كابتن مروان!"));
    }

    function importSchedule() {
        const sourceId = document.getElementById('importFromId').value.trim().toLowerCase();
        db.collection("gym_schedules").doc(sourceId).get().then(doc => {
            if(doc.exists) {
                const d = doc.data();
                document.getElementById('weightInput').value = d.weight || "";
                document.getElementById('fatInput').value = d.fat || "";
                document.getElementById('notesInput').value = d.globalNotes || "";
                document.getElementById('fullHtmlInput').value = d.fullHtml || "";
                alert("تم جلب بيانات " + sourceId + " بنجاح!");
            } else { alert("المتدرب المصدر غير موجود."); }
        });
    }
</script>
</body>
</html>
